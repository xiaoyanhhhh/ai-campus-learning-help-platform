<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>注册</title><link rel="stylesheet" th:href="@{/css/app.css}"></head>
<body>
<main class="auth card">
    <h1>学生注册</h1>
    <form th:action="@{/register}" method="post">
        <label>用户名</label><input name="username" required>
        <label>姓名</label><input name="realName" required>
        <label>学号</label><input name="studentNo">
        <label>邮箱</label><input name="email" type="email">
        <label>密码</label><input name="password" type="password" required>
        <div class="actions"><button type="submit">注册</button><a th:href="@{/login}">返回登录</a></div>
    </form>
</main>
</body>
</html>
