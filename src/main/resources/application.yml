server:
  port: 8080

spring:
  application:
    name: ai-campus-learning-help
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:./data/aihelp;MODE=MySQL;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=TRUE
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB
  thymeleaf:
    cache: false

mybatis:
  configuration:
    map-underscore-to-camel-case: true

app:
  upload-dir: src/main/resources/static/uploads
  ai:
    provider: ${AI_PROVIDER:mock}
    base-url: ${AI_BASE_URL:}
    api-key: ${AI_API_KEY:}
    model: ${AI_MODEL:gpt-4o-mini}
    timeout-ms: ${AI_TIMEOUT_MS:10000}
    mock-enabled: ${AI_MOCK_ENABLED:true}
